{% if results %}
<div class="search-dropdown-content">
    {% for result in results %}
    <a
        href="/fundamentals/{{ result.ticker }}"
        class="search-result-item"
    >
        <span class="stock-symbol">{{ result.ticker }}</span>
        <span class="text-muted text-sm ml-3">{{ result.name }}</span>
    </a>
    {% endfor %}
</div>
{% endif %}
