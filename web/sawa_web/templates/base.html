<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ORION Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/orion.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/static/js/htmx.min.js" defer></script>
    {% block head %}{% endblock %}
</head>
<body hx-boost="true">
    <div class="app-layout">
        <!-- Sidebar -->
        {% include "components/sidebar.html" %}

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            {% include "components/header.html" %}

            <!-- Page Content -->
            <div class="page-container">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <!-- Toast Container for Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <script src="/static/js/orion.js" defer></script>
    {% block scripts %}{% endblock %}
</body>
</html>
