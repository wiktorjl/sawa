{% extends "base.html" %}

{% block title %}Settings - ORION{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-8">
    <div>
        <h1 class="text-3xl font-bold mb-2">Settings</h1>
        <p class="text-muted">Configure your ORION dashboard preferences</p>
    </div>
</div>

<div class="grid grid-cols-12 gap-6">
    <!-- Settings Navigation -->
    <div class="col-span-3">
        <div class="card">
            <nav class="settings-nav">
                <button
                    class="settings-nav-item active"
                    hx-get="/settings/display"
                    hx-target="#settings-content"
                    hx-swap="innerHTML"
                    onclick="setActiveTab(this)"
                >
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <line x1="3" y1="9" x2="21" y2="9"/>
                        <line x1="9" y1="21" x2="9" y2="9"/>
                    </svg>
                    Display
                </button>
                <button
                    class="settings-nav-item"
                    hx-get="/settings/charts"
                    hx-target="#settings-content"
                    hx-swap="innerHTML"
                    onclick="setActiveTab(this)"
                >
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="20" x2="18" y2="10"/>
                        <line x1="12" y1="20" x2="12" y2="4"/>
                        <line x1="6" y1="20" x2="6" y2="14"/>
                    </svg>
                    Charts
                </button>
                <button
                    class="settings-nav-item"
                    hx-get="/settings/behavior"
                    hx-target="#settings-content"
                    hx-swap="innerHTML"
                    onclick="setActiveTab(this)"
                >
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    Behavior
                </button>
                <button
                    class="settings-nav-item"
                    hx-get="/settings/api"
                    hx-target="#settings-content"
                    hx-swap="innerHTML"
                    onclick="setActiveTab(this)"
                >
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
                    </svg>
                    API Keys
                </button>
                <button
                    class="settings-nav-item"
                    hx-get="/settings/account"
                    hx-target="#settings-content"
                    hx-swap="innerHTML"
                    onclick="setActiveTab(this)"
                >
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    Account
                </button>
            </nav>
        </div>
    </div>

    <!-- Settings Content -->
    <div class="col-span-9">
        <div class="card card-glow">
            <div id="settings-content">
                {% include "settings/partials/display.html" %}
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function setActiveTab(element) {
    document.querySelectorAll('.settings-nav-item').forEach(item => {
        item.classList.remove('active');
    });
    element.classList.add('active');
}
</script>
{% endblock %}
