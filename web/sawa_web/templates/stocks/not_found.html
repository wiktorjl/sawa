{% extends "base.html" %}

{% block title %}Stock Not Found - ORION{% endblock %}

{% block content %}
<div class="text-center py-16">
    <div class="text-6xl mb-6 opacity-50">
        <svg class="mx-auto text-danger" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
    </div>
    <h1 class="text-3xl font-bold mb-4">Stock Not Found</h1>
    <p class="text-xl text-muted mb-8">
        The stock <span class="stock-symbol">{{ ticker }}</span> was not found in our database.
    </p>
    <div class="flex justify-center gap-4">
        <a href="/stocks" class="btn btn-secondary">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            Back to Watchlist
        </a>
        <a href="/dashboard" class="btn btn-primary">
            Go to Dashboard
        </a>
    </div>
</div>
{% endblock %}
