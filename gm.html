<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM // CYBERPUNK CHART</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0012;
    color: #e0d0ff;
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .container {
    width: 1100px;
    height: 700px;
    position: relative;
    background: linear-gradient(170deg, #0d0018 0%, #0a0012 40%, #120020 100%);
    border: 1px solid rgba(200, 50, 255, 0.3);
    box-shadow:
      0 0 60px rgba(200, 50, 255, 0.15),
      inset 0 0 80px rgba(100, 20, 150, 0.05);
    overflow: hidden;
  }

  /* Scanlines */
  .container::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(200, 50, 255, 0.015) 2px,
      rgba(200, 50, 255, 0.015) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  /* Grid overlay */
  .container::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      linear-gradient(90deg, rgba(200, 50, 255, 0.03) 1px, transparent 1px),
      linear-gradient(0deg, rgba(200, 50, 255, 0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 1;
  }

  .header {
    position: absolute;
    top: 20px;
    left: 30px;
    z-index: 5;
  }

  .header h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 6px;
    background: linear-gradient(90deg, #ff2d95, #c840ff, #ff2d95);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear infinite;
    text-shadow: 0 0 30px rgba(255, 45, 149, 0.5);
  }

  @keyframes shimmer {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  .header .subtitle {
    font-size: 11px;
    color: rgba(200, 150, 255, 0.5);
    letter-spacing: 4px;
    margin-top: 4px;
  }

  .price-tag {
    position: absolute;
    top: 20px;
    right: 30px;
    text-align: right;
    z-index: 5;
  }

  .price-tag .current {
    font-family: 'Orbitron', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: #00ffa3;
    text-shadow: 0 0 20px rgba(0, 255, 163, 0.4);
  }

  .price-tag .label {
    font-size: 10px;
    color: rgba(200, 150, 255, 0.4);
    letter-spacing: 3px;
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 2;
  }

  .glow-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }

  .glow-orb.pink {
    width: 300px;
    height: 300px;
    background: rgba(255, 45, 149, 0.08);
    top: 30%;
    left: 10%;
    animation: float1 8s ease-in-out infinite;
  }

  .glow-orb.purple {
    width: 250px;
    height: 250px;
    background: rgba(150, 50, 255, 0.06);
    bottom: 10%;
    right: 15%;
    animation: float2 10s ease-in-out infinite;
  }

  @keyframes float1 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(30px, -20px); }
  }

  @keyframes float2 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-20px, 15px); }
  }

  .corner-decoration {
    position: absolute;
    width: 20px;
    height: 20px;
    z-index: 5;
  }

  .corner-decoration.tl { top: 8px; left: 8px; border-top: 2px solid rgba(255, 45, 149, 0.5); border-left: 2px solid rgba(255, 45, 149, 0.5); }
  .corner-decoration.tr { top: 8px; right: 8px; border-top: 2px solid rgba(255, 45, 149, 0.5); border-right: 2px solid rgba(255, 45, 149, 0.5); }
  .corner-decoration.bl { bottom: 8px; left: 8px; border-bottom: 2px solid rgba(200, 50, 255, 0.5); border-left: 2px solid rgba(200, 50, 255, 0.5); }
  .corner-decoration.br { bottom: 8px; right: 8px; border-bottom: 2px solid rgba(200, 50, 255, 0.5); border-right: 2px solid rgba(200, 50, 255, 0.5); }

  .status-bar {
    position: absolute;
    bottom: 12px;
    left: 30px;
    font-size: 9px;
    color: rgba(200, 150, 255, 0.3);
    letter-spacing: 2px;
    z-index: 5;
  }

  .status-bar span {
    margin-right: 20px;
  }

  .status-bar .dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    background: #00ffa3;
    border-radius: 50%;
    margin-right: 6px;
    box-shadow: 0 0 6px rgba(0, 255, 163, 0.6);
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="glow-orb pink"></div>
  <div class="glow-orb purple"></div>

  <div class="corner-decoration tl"></div>
  <div class="corner-decoration tr"></div>
  <div class="corner-decoration bl"></div>
  <div class="corner-decoration br"></div>

  <div class="header">
    <h1>GENERAL MOTORS</h1>
    <div class="subtitle">GM / USD &nbsp;&nbsp;▸&nbsp;&nbsp; NOV 2024 — FEB 2025</div>
  </div>

  <div class="price-tag">
    <div class="label">LATEST PRICE</div>
    <div class="current">$47.39</div>
  </div>

  <canvas id="chart"></canvas>

  <div class="status-bar">
    <span><span class="dot"></span>LIVE FEED</span>
    <span>SYS::NEURAL_NET_v4.2</span>
    <span>SECTOR::AUTO</span>
    <span>EXCHANGE::NYSE</span>
  </div>
</div>

<script>
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');

canvas.width = 1100;
canvas.height = 700;

// GM daily close prices Nov 2024 - Feb 2025
const priceData = [
  { date: 'Nov 7', price: 55.39 },
  { date: 'Nov 8', price: 55.58 },
  { date: 'Nov 11', price: 57.66 },
  { date: 'Nov 12', price: 57.41 },
  { date: 'Nov 13', price: 57.71 },
  { date: 'Nov 14', price: 57.62 },
  { date: 'Nov 15', price: 57.04 },
  { date: 'Nov 18', price: 56.25 },
  { date: 'Nov 19', price: 55.11 },
  { date: 'Nov 20', price: 54.87 },
  { date: 'Nov 21', price: 55.68 },
  { date: 'Nov 22', price: 58.53 },
  { date: 'Nov 25', price: 60.20 },
  { date: 'Nov 26', price: 54.79 },
  { date: 'Nov 27', price: 55.50 },
  { date: 'Nov 29', price: 55.59 },
  { date: 'Dec 2', price: 55.04 },
  { date: 'Dec 3', price: 53.66 },
  { date: 'Dec 4', price: 53.36 },
  { date: 'Dec 5', price: 53.39 },
  { date: 'Dec 6', price: 53.41 },
  { date: 'Dec 9', price: 52.71 },
  { date: 'Dec 10', price: 52.74 },
  { date: 'Dec 11', price: 52.04 },
  { date: 'Dec 12', price: 52.30 },
  { date: 'Dec 13', price: 52.53 },
  { date: 'Dec 16', price: 52.24 },
  { date: 'Dec 17', price: 51.15 },
  { date: 'Dec 18', price: 49.99 },
  { date: 'Dec 19', price: 50.34 },
  { date: 'Dec 20', price: 51.81 },
  { date: 'Dec 23', price: 52.56 },
  { date: 'Dec 24', price: 53.51 },
  { date: 'Dec 26', price: 54.18 },
  { date: 'Dec 27', price: 54.28 },
  { date: 'Dec 30', price: 53.66 },
  { date: 'Dec 31', price: 53.27 },
  { date: 'Jan 2', price: 51.37 },
  { date: 'Jan 3', price: 51.77 },
  { date: 'Jan 6', price: 53.53 },
  { date: 'Jan 7', price: 51.98 },
  { date: 'Jan 8', price: 51.00 },
  { date: 'Jan 10', price: 49.85 },
  { date: 'Jan 13', price: 49.93 },
  { date: 'Jan 14', price: 50.94 },
  { date: 'Jan 15', price: 51.70 },
  { date: 'Jan 16', price: 51.84 },
  { date: 'Jan 17', price: 50.97 },
  { date: 'Jan 21', price: 53.89 },
  { date: 'Jan 22', price: 52.76 },
  { date: 'Jan 23', price: 54.22 },
  { date: 'Jan 24', price: 53.91 },
  { date: 'Jan 27', price: 54.92 },
  { date: 'Jan 28', price: 50.04 },
  { date: 'Jan 29', price: 49.78 },
  { date: 'Jan 30', price: 49.50 },
  { date: 'Jan 31', price: 49.46 },
  { date: 'Feb 3', price: 47.90 },
  { date: 'Feb 4', price: 48.57 },
  { date: 'Feb 5', price: 47.81 },
  { date: 'Feb 6', price: 47.93 },
  { date: 'Feb 7', price: 47.39 },
];

// Chart area
const chartLeft = 90;
const chartRight = 1060;
const chartTop = 90;
const chartBottom = 620;
const chartWidth = chartRight - chartLeft;
const chartHeight = chartBottom - chartTop;

const minPrice = 45;
const maxPrice = 62;
const priceRange = maxPrice - minPrice;

function priceToY(price) {
  return chartBottom - ((price - minPrice) / priceRange) * chartHeight;
}

function indexToX(i) {
  return chartLeft + (i / (priceData.length - 1)) * chartWidth;
}

// Draw grid lines
function drawGrid() {
  ctx.strokeStyle = 'rgba(150, 80, 220, 0.07)';
  ctx.lineWidth = 1;

  // Horizontal
  for (let p = 45; p <= 62; p += 2) {
    const y = priceToY(p);
    ctx.beginPath();
    ctx.moveTo(chartLeft, y);
    ctx.lineTo(chartRight, y);
    ctx.stroke();
  }

  // Vertical
  for (let i = 0; i < priceData.length; i += 10) {
    const x = indexToX(i);
    ctx.beginPath();
    ctx.moveTo(x, chartTop);
    ctx.lineTo(x, chartBottom);
    ctx.stroke();
  }
}

// Draw support zone
function drawSupportZone() {
  const y1 = priceToY(48);
  const y2 = priceToY(46);

  // Gradient fill
  const grad = ctx.createLinearGradient(0, y1, 0, y2);
  grad.addColorStop(0, 'rgba(255, 45, 149, 0.12)');
  grad.addColorStop(0.5, 'rgba(200, 64, 255, 0.08)');
  grad.addColorStop(1, 'rgba(255, 45, 149, 0.12)');

  ctx.fillStyle = grad;
  ctx.fillRect(chartLeft, y1, chartWidth, y2 - y1);

  // Top border
  ctx.strokeStyle = 'rgba(255, 45, 149, 0.6)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(chartLeft, y1);
  ctx.lineTo(chartRight, y1);
  ctx.stroke();

  // Bottom border
  ctx.strokeStyle = 'rgba(200, 64, 255, 0.6)';
  ctx.beginPath();
  ctx.moveTo(chartLeft, y2);
  ctx.lineTo(chartRight, y2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Support Zone label
  const labelX = chartRight - 180;
  const labelY = (y1 + y2) / 2;

  // Label background
  ctx.fillStyle = 'rgba(10, 0, 18, 0.7)';
  ctx.strokeStyle = 'rgba(255, 45, 149, 0.5)';
  ctx.lineWidth = 1;
  const lw = 160, lh = 48;
  ctx.beginPath();
  ctx.roundRect(labelX - lw/2, labelY - lh/2, lw, lh, 4);
  ctx.fill();
  ctx.stroke();

  // Text
  ctx.font = '900 18px Orbitron';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Glow
  ctx.shadowColor = 'rgba(255, 45, 149, 0.8)';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#ff2d95';
  ctx.fillText('SUPPORT', labelX, labelY - 2);
  ctx.shadowBlur = 0;

  // Price range label
  ctx.font = '11px Share Tech Mono';
  ctx.fillStyle = 'rgba(200, 150, 255, 0.5)';
  ctx.fillText('$46.00 — $48.00', labelX, labelY + 16);

  // Price axis labels for zone
  ctx.textAlign = 'right';
  ctx.font = '11px Share Tech Mono';
  ctx.fillStyle = 'rgba(255, 45, 149, 0.7)';
  ctx.fillText('$48', chartLeft - 10, y1 + 4);
  ctx.fillStyle = 'rgba(200, 64, 255, 0.7)';
  ctx.fillText('$46', chartLeft - 10, y2 + 4);
}

// Draw price axis labels
function drawAxes() {
  ctx.font = '10px Share Tech Mono';
  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(200, 150, 255, 0.3)';

  for (let p = 45; p <= 62; p += 2) {
    if (p === 46 || p === 48) continue;
    const y = priceToY(p);
    ctx.fillText('$' + p, chartLeft - 10, y + 4);
  }

  // Date labels
  ctx.textAlign = 'center';
  for (let i = 0; i < priceData.length; i += 10) {
    const x = indexToX(i);
    ctx.fillText(priceData[i].date, x, chartBottom + 18);
  }
}

// Draw the price line with glow
function drawPriceLine() {
  // Outer glow
  ctx.strokeStyle = 'rgba(0, 255, 163, 0.15)';
  ctx.lineWidth = 12;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  priceData.forEach((d, i) => {
    const x = indexToX(i);
    const y = priceToY(d.price);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Mid glow
  ctx.strokeStyle = 'rgba(0, 255, 163, 0.3)';
  ctx.lineWidth = 5;
  ctx.beginPath();
  priceData.forEach((d, i) => {
    const x = indexToX(i);
    const y = priceToY(d.price);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Core line
  ctx.strokeStyle = '#00ffa3';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  priceData.forEach((d, i) => {
    const x = indexToX(i);
    const y = priceToY(d.price);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Area gradient under the line
  const areaGrad = ctx.createLinearGradient(0, chartTop, 0, chartBottom);
  areaGrad.addColorStop(0, 'rgba(0, 255, 163, 0.08)');
  areaGrad.addColorStop(1, 'rgba(0, 255, 163, 0.0)');

  ctx.fillStyle = areaGrad;
  ctx.beginPath();
  priceData.forEach((d, i) => {
    const x = indexToX(i);
    const y = priceToY(d.price);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.lineTo(indexToX(priceData.length - 1), chartBottom);
  ctx.lineTo(chartLeft, chartBottom);
  ctx.closePath();
  ctx.fill();
}

// Draw data point markers
function drawMarkers() {
  priceData.forEach((d, i) => {
    const x = indexToX(i);
    const y = priceToY(d.price);

    // Glow
    ctx.beginPath();
    ctx.arc(x, y, 6, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0, 255, 163, 0.15)';
    ctx.fill();

    // Dot
    ctx.beginPath();
    ctx.arc(x, y, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = '#00ffa3';
    ctx.fill();
  });

  // Highlight 3-month high
  const highIdx = priceData.reduce((maxI, d, i) => d.price > priceData[maxI].price ? i : maxI, 0);
  const highX = indexToX(highIdx);
  const highY = priceToY(priceData[highIdx].price);

  // High diamond marker
  ctx.save();
  ctx.translate(highX, highY - 25);

  ctx.shadowColor = 'rgba(255, 45, 149, 0.8)';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#ff2d95';
  ctx.beginPath();
  ctx.moveTo(0, -6);
  ctx.lineTo(5, 0);
  ctx.lineTo(0, 6);
  ctx.lineTo(-5, 0);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.font = '700 11px Orbitron';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff2d95';
  ctx.fillText('3M HIGH $60.20', 0, -14);
  ctx.restore();

  // Highlight 3-month low
  const lowIdx = priceData.reduce((minI, d, i) => d.price < priceData[minI].price ? i : minI, 0);
  const lowX = indexToX(lowIdx);
  const lowY = priceToY(priceData[lowIdx].price);

  // Low diamond marker
  ctx.save();
  ctx.translate(lowX, lowY + 25);

  ctx.shadowColor = 'rgba(255, 45, 149, 0.8)';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#ff2d95';
  ctx.beginPath();
  ctx.moveTo(0, -6);
  ctx.lineTo(5, 0);
  ctx.lineTo(0, 6);
  ctx.lineTo(-5, 0);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.font = '700 11px Orbitron';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff2d95';
  ctx.fillText('3M LOW $47.39', 0, 20);
  ctx.restore();
}

// Render
drawGrid();
drawSupportZone();
drawAxes();
drawPriceLine();
drawMarkers();
</script>

</body>
</html>
