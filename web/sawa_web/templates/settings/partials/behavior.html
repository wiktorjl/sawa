<div class="settings-section">
    <h2 class="text-xl font-semibold mb-2">Behavior Settings</h2>
    <p class="text-muted mb-6">Configure default behaviors and timeframes</p>

    <div class="space-y-6">
        <!-- Fundamentals Timeframe -->
        <div class="setting-item">
            <div class="setting-info">
                <label class="setting-label" for="fundamentals_timeframe">{{ settings.fundamentals_timeframe.label }}</label>
                <p class="setting-description">{{ settings.fundamentals_timeframe.description }}</p>
            </div>
            <div class="setting-control">
                <select
                    id="fundamentals_timeframe"
                    name="value"
                    class="form-select"
                    hx-post="/settings/update"
                    hx-vals='{"key": "fundamentals_timeframe"}'
                    hx-target="#fundamentals_timeframe_status"
                    hx-swap="innerHTML"
                >
                    {% for option in settings.fundamentals_timeframe.options %}
                    <option value="{{ option }}" {% if settings.fundamentals_timeframe.value == option %}selected{% endif %}>
                        {{ option|title }}
                    </option>
                    {% endfor %}
                </select>
                <span id="fundamentals_timeframe_status" class="setting-status"></span>
            </div>
        </div>
    </div>
</div>
